<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <rect width="300" height="300" fill="#0a0f1e"/>

  <!-- Title -->
  <text x="150" y="38" font-family="system-ui,sans-serif" font-size="13" fill="#00d4ff" text-anchor="middle" font-weight="bold">TÊTE ROTATIVE 360°</text>
  <text x="150" y="56" font-family="system-ui,sans-serif" font-size="10" fill="#8899bb" text-anchor="middle">Atteint chaque coin sans effort</text>

  <!-- Floor plan view -->
  <!-- Room corner -->
  <path d="M60 250 L60 80 L240 80" stroke="#253156" stroke-width="2" stroke-linecap="round"/>
  <text x="55" y="265" font-family="system-ui,sans-serif" font-size="9" fill="#4a5568">coin</text>

  <!-- Mop head in corner — can rotate -->
  <g transform="translate(90, 115)">
    <!-- Rotation arc -->
    <path d="M 0 0 A 55 55 0 0 1 55 0" stroke="#00d4ff" stroke-width="1.5" stroke-dasharray="5,3" fill="none" opacity="0.4"/>
    <path d="M 0 0 A 40 40 0 0 1 0 40" stroke="#00d4ff" stroke-width="1.5" stroke-dasharray="5,3" fill="none" opacity="0.3"/>
    <!-- Mop head positions -->
    <!-- Position 1: straight -->
    <rect x="-14" y="-5" width="60" height="22" rx="8" fill="#0099cc" opacity="0.9"/>
    <!-- Position 2: rotated 45° -->
    <rect x="15" y="15" width="60" height="22" rx="8" fill="#00d4ff" opacity="0.4" transform="rotate(45, 15, 15)"/>
    <!-- Position 3: rotated 90° -->
    <rect x="30" y="-10" width="22" height="60" rx="8" fill="#00d4ff" opacity="0.25"/>
    <!-- Center pivot -->
    <circle cx="14" cy="8" r="6" fill="#0a0f1e" stroke="#00d4ff" stroke-width="1.5"/>
    <circle cx="14" cy="8" r="2.5" fill="#00d4ff"/>
    <!-- Arrow showing rotation -->
    <path d="M 40 -20 Q 60 -30 70 -10" stroke="#00d4ff" stroke-width="1.5" fill="none" marker-end="url(#arrow)" opacity="0.7"/>
  </g>

  <!-- 360° badge -->
  <circle cx="230" cy="130" r="28" fill="#0d1526" stroke="#00d4ff" stroke-width="1.5" opacity="0.9"/>
  <text x="230" y="126" font-family="system-ui,sans-serif" font-size="14" fill="#00d4ff" text-anchor="middle" font-weight="900">360°</text>
  <text x="230" y="141" font-family="system-ui,sans-serif" font-size="8" fill="#8899bb" text-anchor="middle">rotation</text>

  <!-- Benefits list -->
  <rect x="40" y="215" width="220" height="72" rx="14" fill="#0d1526" stroke="rgba(0,212,255,0.15)" stroke-width="1"/>
  <text x="60" y="235" font-family="system-ui,sans-serif" font-size="10" fill="#c0c8e0">✅  Coins de murs sans effort</text>
  <text x="60" y="252" font-family="system-ui,sans-serif" font-size="10" fill="#c0c8e0">✅  Sous les meubles facilement</text>
  <text x="60" y="269" font-family="system-ui,sans-serif" font-size="10" fill="#c0c8e0">✅  Zéro zone oubliée</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#00d4ff" opacity="0.7"/>
    </marker>
  </defs>
</svg>
