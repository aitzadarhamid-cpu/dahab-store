<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <rect width="300" height="300" fill="#0a0f1e"/>
  <ellipse cx="150" cy="150" rx="100" ry="80" fill="#00d4ff" opacity="0.05"/>

  <!-- Title -->
  <text x="150" y="40" font-family="system-ui,sans-serif" font-size="13" fill="#00d4ff" text-anchor="middle" font-weight="bold">ESSORAGE AUTOMATIQUE</text>
  <text x="150" y="58" font-family="system-ui,sans-serif" font-size="10" fill="#8899bb" text-anchor="middle">Mécanisme par levier central</text>

  <!-- Handle segment -->
  <rect x="138" y="68" width="24" height="60" rx="12" fill="url(#handleMini)"/>
  <rect x="141" y="72" width="6" height="52" rx="3" fill="white" opacity="0.12"/>

  <!-- Lever button -->
  <rect x="104" y="120" width="92" height="26" rx="13" fill="url(#leverBtn)"/>
  <rect x="107" y="123" width="86" height="20" rx="10" fill="url(#leverBtnInner)"/>
  <circle cx="150" cy="133" r="8" fill="#00d4ff" opacity="0.9"/>
  <circle cx="150" cy="133" r="4" fill="white"/>
  <!-- Lever label -->
  <text x="120" y="137" font-family="system-ui,sans-serif" font-size="8" fill="white" opacity="0.6">PRESS</text>
  <text x="175" y="137" font-family="system-ui,sans-serif" font-size="8" fill="white" opacity="0.6" text-anchor="end">PRESS</text>

  <!-- Arrow showing press action -->
  <path d="M150 155 L150 175" stroke="#00d4ff" stroke-width="2" stroke-dasharray="3,2" opacity="0.6"/>
  <polygon points="145,172 155,172 150,182" fill="#00d4ff" opacity="0.6"/>

  <!-- Wringer block -->
  <rect x="95" y="182" width="110" height="24" rx="8" fill="#1a2340" stroke="#253156" stroke-width="1"/>
  <!-- Wringer rollers visual -->
  <ellipse cx="128" cy="194" rx="18" ry="8" fill="#253156" stroke="#00d4ff" stroke-width="0.5" stroke-opacity="0.3"/>
  <ellipse cx="172" cy="194" rx="18" ry="8" fill="#253156" stroke="#00d4ff" stroke-width="0.5" stroke-opacity="0.3"/>

  <!-- Water drops being squeezed out -->
  <circle cx="88" cy="200" r="5" fill="#00d4ff" opacity="0.5"/>
  <circle cx="78" cy="210" r="3" fill="#00d4ff" opacity="0.3"/>
  <circle cx="212" cy="200" r="5" fill="#00d4ff" opacity="0.5"/>
  <circle cx="222" cy="212" r="3" fill="#00d4ff" opacity="0.3"/>

  <!-- "Mains sèches" callout -->
  <rect x="60" y="232" width="80" height="36" rx="10" fill="#0d1526" stroke="#34d399" stroke-width="1" stroke-opacity="0.5"/>
  <text x="100" y="248" font-family="system-ui,sans-serif" font-size="9" fill="#34d399" text-anchor="middle" font-weight="bold">✋ Mains</text>
  <text x="100" y="261" font-family="system-ui,sans-serif" font-size="9" fill="#34d399" text-anchor="middle" font-weight="bold">100% sèches</text>

  <!-- "Eau sale" callout -->
  <rect x="160" y="232" width="80" height="36" rx="10" fill="#0d1526" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.4"/>
  <text x="200" y="248" font-family="system-ui,sans-serif" font-size="9" fill="#00d4ff" text-anchor="middle">💧 Eau sale</text>
  <text x="200" y="261" font-family="system-ui,sans-serif" font-size="9" fill="#00d4ff" text-anchor="middle">évacuée</text>

  <defs>
    <linearGradient id="handleMini" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8899bb"/>
      <stop offset="50%" stop-color="#c0cde0"/>
      <stop offset="100%" stop-color="#8899bb"/>
    </linearGradient>
    <linearGradient id="leverBtn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0088cc"/>
    </linearGradient>
    <linearGradient id="leverBtnInner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00eeff"/>
      <stop offset="100%" stop-color="#00aadd"/>
    </linearGradient>
  </defs>
</svg>
